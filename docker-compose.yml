services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cryptobot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=cryptobot;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}"
      Jwt__Secret: ${JWT_SECRET:-super-secret-jwt-key-change-in-production-minimum-32-chars!!}
      Encryption__Key: ${ENCRYPTION_KEY:-default-encryption-key-change-in-production!!}
      Admin__Username: ${ADMIN_USERNAME:-admin}
      Admin__Password: ${ADMIN_PASSWORD:-admin123}
      ASPNETCORE_ENVIRONMENT: Production
      TronGrid__ApiKey: ${TRONGRID_API_KEY:-}
      BscScan__ApiKey: ${BSCSCAN_API_KEY:-}
    ports:
      - "8100:5000"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=cryptobot;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}"
      Encryption__Key: ${ENCRYPTION_KEY:-default-encryption-key-change-in-production!!}
      TronGrid__ApiKey: ${TRONGRID_API_KEY:-}
      BscScan__ApiKey: ${BSCSCAN_API_KEY:-}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3100:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cryptobotweb.rule=Host(`bot.cryptopizza.pl`)"
      - "traefik.http.routers.cryptobotweb.entrypoints=websecure"
      - "traefik.http.routers.cryptobotweb.tls.certresolver=le"
      - "traefik.http.services.cryptobotweb.loadbalancer.server.port=80"
    networks:
      - default
      - web

volumes:
  pgdata:

networks:
  web:
    external: true
